# Verifies action/workflow calls are pinned to SHA commit values
name: 'Check GitHub Workflows'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'main'
      - 'master'
    paths: ['.github/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify:
    name: Check GitHub Actions
    # yamllint disable-line rule:line-length
    uses: lfit/releng-reusable-workflows/.github/workflows/reuse-verify-github-actions.yaml@37bbdea5cca2f21e502f7ff580306c78307d1d41 # v0.3.1
    permissions:
      contents: read
